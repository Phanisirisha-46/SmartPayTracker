<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPay Tracker - Database Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0F0F16;
            --bg-secondary: #1E1E2E;
            --bg-card: rgba(30, 30, 46, 0.7);
            --primary: #00B4D8;
            --primary-glow: rgba(0, 180, 216, 0.2);
            --text-primary: #FFFFFF;
            --text-secondary: #9FA2B4;
            --text-muted: #6C757D;
            --border-color: rgba(255, 255, 255, 0.08);
            --success: #6BCB77;
            --danger: #F25C54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #050508;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 24px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #FFF;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 i {
            color: var(--primary);
        }

        .back-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: #252538;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab-btn:hover {
            color: #FFF;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-btn.active {
            color: var(--primary);
            background: var(--primary-glow);
        }

        /* Card Wrapper */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            overflow-x: auto;
        }

        /* Tables Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            color: var(--text-secondary);
            font-weight: 600;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #E2E8F0;
        }

        tr:last-child td {
            border: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        /* Badges & Accents */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .text-success {
            color: var(--success);
        }

        .text-danger {
            color: var(--danger);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 16px;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Mobile Responsiveness for DB Explorer */
        @media (max-width: 768px) {
            body {
                padding: 16px 12px;
            }
            .container {
                gap: 16px;
            }
            header {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                text-align: center;
            }
            header h1 {
                font-size: 22px;
                justify-content: center;
            }
            header div {
                display: flex;
                flex-direction: column;
                gap: 8px;
                width: 100%;
            }
            .back-btn {
                width: 100%;
                justify-content: center;
            }
            .tabs {
                overflow-x: auto;
                white-space: nowrap;
                padding-bottom: 8px;
                -webkit-overflow-scrolling: touch;
            }
            .tab-btn {
                padding: 10px 14px;
                font-size: 13px;
            }
            .card {
                padding: 16px 12px;
            }
            table {
                font-size: 12px;
            }
            th, td {
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <h1><i class="fa-solid fa-database"></i> SmartPay Database Explorer</h1>
            <div style="display: flex; gap: 10px;">
                <button class="back-btn" onclick="resetDatabase()" style="background: rgba(242, 92, 84, 0.15); border-color: var(--danger); color: var(--danger);"><i class="fa-solid fa-trash-can"></i> Reset Database</button>
                <a href="/" class="back-btn"><i class="fa-solid fa-circle-play"></i> App Simulator</a>
            </div>
        </header>

        <!-- Tabs Nav -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('users')"><i class="fa-solid fa-users"></i> Users</button>
            <button class="tab-btn" onclick="switchTab('budgets')"><i class="fa-solid fa-building-columns"></i> Budgets</button>
            <button class="tab-btn" onclick="switchTab('categories')"><i class="fa-solid fa-tags"></i> Categories</button>
            <button class="tab-btn" onclick="switchTab('expenses')"><i class="fa-solid fa-receipt"></i> Expenses</button>
        </div>

        <!-- Table Card -->
        <div class="card">
            <div id="table-container">
                <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Connecting to PostgreSQL...</div>
            </div>
        </div>

    </div>

    <script>
        let dbData = null;
        let currentTab = 'users';

        // Load DB values on launch
        async function loadDatabase() {
            try {
                const response = await fetch('/api/admin/db');
                if (!response.ok) throw new Error("Failed to query API");
                dbData = await response.json();
                renderTable();
            } catch (err) {
                document.getElementById('table-container').innerHTML = `
                    <div style="color: var(--danger); text-align: center; padding: 40px;">
                        <i class="fa-solid fa-triangle-exclamation" style="font-size: 40px; margin-bottom: 12px;"></i>
                        <p>Failed to query local database. Ensure the FastAPI server is running.</p>
                    </div>
                `;
            }
        }

        function switchTab(tabKey) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.innerText.toLowerCase().includes(tabKey)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            currentTab = tabKey;
            renderTable();
        }

        function renderTable() {
            if (!dbData) return;
            const container = document.getElementById('table-container');
            const data = dbData[currentTab];

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="empty"><i class="fa-solid fa-inbox"></i> No rows found in the '${currentTab}' table.</div>`;
                return;
            }

            let html = `<table>`;

            if (currentTab === 'users') {
                html += `
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Created At</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                data.forEach(row => {
                    html += `
                        <tr>
                            <td><strong>#${row.id}</strong></td>
                            <td>${row.name}</td>
                            <td><code>${row.email}</code></td>
                            <td>${new Date(row.created_at).toLocaleString()}</td>
                            <td>
                                <button onclick="deleteUser(${row.id})" style="background: none; border: none; color: var(--danger); cursor: pointer; font-weight: 500;"><i class="fa-solid fa-trash-can"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } 
            else if (currentTab === 'budgets') {
                html += `
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>User ID</th>
                            <th>Total Budget</th>
                            <th>Period</th>
                            <th>Created At</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                data.forEach(row => {
                    html += `
                        <tr>
                            <td><strong>#${row.id}</strong></td>
                            <td>User #${row.user_id}</td>
                            <td class="text-success" style="font-weight: 700;">₹${row.total_amount.toLocaleString()}</td>
                            <td>${row.month}/${row.year}</td>
                            <td>${new Date(row.created_at).toLocaleString()}</td>
                        </tr>
                    `;
                });
            } 
            else if (currentTab === 'categories') {
                html += `
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Budget ID</th>
                            <th>Category Name</th>
                            <th>Allocated</th>
                            <th>Remaining</th>
                            <th>Visual Style</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                data.forEach(row => {
                    html += `
                        <tr>
                            <td><strong>#${row.id}</strong></td>
                            <td>Budget #${row.budget_id}</td>
                            <td><i class="fa-solid fa-tag"></i> <strong>${row.category_name}</strong></td>
                            <td>₹${row.allocated_amount.toLocaleString()}</td>
                            <td class="${row.remaining_amount <= 0 ? 'text-danger' : 'text-success'}">₹${row.remaining_amount.toLocaleString()}</td>
                            <td>
                                <span class="badge" style="background-color: ${row.color}18; color: ${row.color}">
                                    <span class="badge-color" style="background-color: ${row.color}"></span>
                                    Icon: ${row.icon}
                                </span>
                            </td>
                        </tr>
                    `;
                });
            } 
            else if (currentTab === 'expenses') {
                html += `
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Category ID</th>
                            <th>Amount</th>
                            <th>Merchant</th>
                            <th>Date</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>
                `;
                data.forEach(row => {
                    html += `
                        <tr>
                            <td><strong>#${row.id}</strong></td>
                            <td>Category #${row.category_id}</td>
                            <td class="text-danger" style="font-weight: 700;">₹${row.amount.toLocaleString()}</td>
                            <td><strong>${row.merchant}</strong></td>
                            <td>${row.date}</td>
                            <td><span style="color: var(--text-secondary); font-style: italic;">${row.remarks || '-'}</span></td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        async function resetDatabase() {
            if (!confirm("Are you sure you want to reset the database? This will delete all users, budgets, categories, and expenses!")) {
                return;
            }
            try {
                const response = await fetch('/api/admin/db/reset', { method: 'POST' });
                if (!response.ok) throw new Error("Failed to reset database");
                alert("Database reset successfully!");
                loadDatabase();
            } catch (err) {
                alert("Error resetting database: " + err.message);
            }
        }

        async function deleteUser(id) {
            if (!confirm("Are you sure you want to delete this user? All their budgets, categories, and expenses will be permanently deleted!")) {
                return;
            }
            try {
                const response = await fetch(`/api/admin/user/${id}`, { method: 'DELETE' });
                if (!response.ok) throw new Error("Failed to delete user");
                alert("User deleted successfully!");
                loadDatabase();
            } catch (err) {
                alert("Error deleting user: " + err.message);
            }
        }

        loadDatabase();
    </script>
</body>
</html>
