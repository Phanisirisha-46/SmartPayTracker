services:
  - type: web
    name: smartpay-tracker-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartpay-db
          property: connectionString

databases:
  - name: smartpay-db
    databaseName: smartbudget
    user: postgres
